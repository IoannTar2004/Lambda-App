services:
  react-builder:
    build:
      context: ./frontend
      args:
        - MODE=${MODE:-example}
    container_name: react-builder
    volumes:
      - static-files:/usr/share/nginx/html

  nginx-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static-files:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - react-builder

  minio-code:
    image: minio/minio
    container_name: minio-code
    environment:
      - MINIO_ROOT_USER=${MINIO_CODE_ROOT_USER:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_CODE_ROOT_PASSWORD:-minio123}
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - minio-code-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9001/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/minio
    depends_on:
      minio-code:
        condition: service_healthy
    environment:
      - MINIO_CODE_ROOT_USER=${MINIO_CODE_ROOT_USER:-minio}
      - MINIO_CODE_ROOT_PASSWORD=${MINIO_CODE_ROOT_PASSWORD:-minio123}
    volumes:
      - ./init/minio/minio_code_init.sh:/init.sh:z
    entrypoint: [ "/bin/sh", "/init.sh" ]
    restart: "no"

volumes:
  static-files:
  minio-code-data: