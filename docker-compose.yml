services:
  react-builder:
    build:
      context: ./frontend
      args:
        - MODE=${MODE:-example}
    container_name: react_builder
    volumes:
      - static-files:/usr/share/nginx/html

  db:
    image: postgres:18-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_pass}
      POSTGRES_DB: ${POSTGRES_DB:-events_db}
    ports:
      - "5433:5432"
    volumes:
      - db-events-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-code:
    image: minio/minio
    container_name: minio-code
    environment:
      - MINIO_ROOT_USER=${MINIO_CODE_ROOT_USER:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_CODE_ROOT_PASSWORD:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-code-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9001/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-code-init:
    image: minio/minio
    depends_on:
      minio-code:
        condition: service_healthy
    environment:
      - MINIO_CODE_ROOT_USER=${MINIO_CODE_ROOT_USER:-minio}
      - MINIO_CODE_ROOT_PASSWORD=${MINIO_CODE_ROOT_PASSWORD:-minio123}
    volumes:
      - ./init/minio/minio_code_init.sh:/init.sh:z
    entrypoint: [ "/bin/sh", "/init.sh" ]
    restart: "no"

  minio-my-storage:
    image: minio/minio
    container_name: minio-my-storage
    environment:
      - MINIO_ROOT_USER=${MINIO_MY_ROOT_USER:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_MY_ROOT_PASSWORD:-minio123}
    ports:
      - "9002:9000"
      - "9003:9001"
    volumes:
      - minio-my-storage-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9001/minio/health/live" ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-my-storage-init:
    image: minio/minio
    depends_on:
      minio-my-storage:
        condition: service_healthy
    environment:
      - MINIO_MY_ROOT_USER=${MINIO_MY_ROOT_USER:-minio}
      - MINIO_MY_ROOT_PASSWORD=${MINIO_MY_ROOT_PASSWORD:-minio123}
    volumes:
      - ./init/minio/minio_my_storage_init.sh:/init.sh:z
    entrypoint: [ "/bin/sh", "/init.sh" ]
    restart: "no"

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9092:9092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    command: >
      sh -c "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic events
      --partitions 3
      --replication-factor 1"

  consul:
    image: consul:1.15.4
    container_name: consul
    ports:
      - "8500:8500"

  redis:
    image: redis
    container_name: redis_logs
    ports:
      - "6379:6379"

  code-service:
    build:
      context: ./code-service
    container_name: code_service
    ports:
      - "8001:8001"
    environment:
      - ENV_FILE=${ENV_FILE:-.env.example}
    depends_on:
      - consul
      - minio-code-init
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 5s
      timeout: 5s
      retries: 3

  events-service:
    build:
      context: ./events-service
    container_name: events_service
    command: sh -c "alembic upgrade head && python app/events_service_main.py"
    ports:
      - "8002:8002"
    environment:
      - ENV_FILE=${ENV_FILE:-.env.example}
    depends_on:
      kafka:
        condition: service_healthy
      consul:
        condition: service_started
      minio-my-storage-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 5s
      timeout: 5s
      retries: 3

  execution-service:
    build:
      context: ./execution-service
    container_name: execution-service
    ports:
      - "8003:8003"
    environment:
      - ENV_FILE=${ENV_FILE:-.env.example}
      - HOST_LAMBDA_SCRIPT=${PWD}/execution-service/lambda_run.py
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./code-archives:/usr/code_archives
      - ./execution-service/lambda_run.py:/app/lambda_run.py
    depends_on:
      kafka:
        condition: service_healthy
      consul:
        condition: service_started
      redis:
        condition: service_started

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8003/health" ]
      interval: 5s
      timeout: 5s
      retries: 3

  minio-my-storage-config:
    image: minio/minio
    depends_on:
      minio-my-storage:
        condition: service_healthy
      events-service:
        condition: service_healthy

    environment:
      - MINIO_MY_ROOT_USER=${MINIO_MY_ROOT_USER:-minio}
      - MINIO_MY_ROOT_PASSWORD=${MINIO_MY_ROOT_PASSWORD:-minio123}
      - COMMUNICATION_TOKEN=${COMMUNICATION_TOKEN}
    volumes:
      - ./init/minio/minio_my_storage_config.sh:/init.sh:z
    entrypoint: [ "/bin/sh", "/init.sh" ]
    restart: "no"

  nginx-gateway:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static-files:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - code-service
      - events-service
      - execution-service
      - react-builder

volumes:
  static-files:
  db-events-data:
  minio-code-data:
  minio-my-storage-data:
  kafka-data: